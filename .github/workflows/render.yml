name: Render Remotion Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    name: Render MP4
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      REMOTION_CHROMIUM_FLAGS: "--enable-unsafe-swiftshader --ignore-gpu-blocklist --disable-gpu-sandbox --disable-dev-shm-usage"

    steps:
      - name: Checkout MAIN
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgl1 \
            libegl1 \
            libgles2 \
            libx11-6 \
            libxext6 \
            libxi6 \
            libxrender1 \
            libxtst6 \
            libnss3 \
            libxss1 \
            libasound2t64

      - name: Install npm dependencies
        run: npm ci

      - name: Create output directory
        run: mkdir -p out

      - name: Render video
        run: npm run render:ci

      - name: Verify rendered file
        run: test -f out/iamazing-school.mp4

      - name: Upload rendered MP4
        uses: actions/upload-artifact@v4
        with:
          name: iamazing-school.mp4
          path: out/iamazing-school.mp4
          if-no-files-found: error
