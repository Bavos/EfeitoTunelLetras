name: Render Remotion Video

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    name: Render MP4
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MAIN
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate MAIN branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "❌ Este workflow só pode rodar na MAIN."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            mesa-utils \
            libgl1 \
            libegl1 \
            libgles2 \
            libx11-6 \
            libxext6 \
            libxi6 \
            libxrender1 \
            libxtst6 \
            libnss3 \
            libxss1 \
            libasound2t64

      - name: Install npm dependencies
        run: npm install

      - name: Verify Remotion
        run: npx remotion versions

      - name: Create output directory
        run: mkdir -p out

      - name: Render video
        run: |
          xvfb-run -a \
          npx remotion render \
          src/index.ts \
          IamazingTunnel \
          out/iamazing-tunnel.mp4 \
          --gl=angle \
          --concurrency=1 \
          --timeout=600000

      - name: Verify rendered file
        run: |
          ls -lah out
          test -f out/iamazing-tunnel.mp4

      - name: Upload rendered MP4
        uses: actions/upload-artifact@v4
        with:
          name: iamazing-school-remotion-render
          path: out/iamazing-tunnel.mp4
          if-no-files-found: error
